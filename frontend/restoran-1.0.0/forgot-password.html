<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Restoran - Quên Mật Khẩu</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <!-- Font Awesome cho các icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container-xxl bg-white p-0">
        <div class="container-xxl position-relative p-0">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 py-3">
                <a href="index.html" class="navbar-brand p-0">
                    <h1 class="text-primary m-0">Restoran</h1>
                </a>
                
                <!-- Tuỳ chọn: Nút chuyển ngôn ngữ gọn nhẹ trên Navbar -->
                <div class="navbar-nav ms-auto py-0 pe-4">
                    <div class="nav-item dropdown d-flex align-items-center">
                        <a href="#" class="nav-link dropdown-toggle text-primary fw-bold" data-bs-toggle="dropdown" id="lang-label">
                            VI
                        </a>
                        <div class="dropdown-menu dropdown-menu-end m-0 shadow-sm">
                            <a href="#" class="dropdown-item lang-option" data-lang="vi">VI - Tiếng Việt</a>
                            <a href="#" class="dropdown-item lang-option" data-lang="en">EN - English</a>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="container-xxl py-5 bg-dark hero-header mb-5">
                <div class="container text-center my-5 pt-5 pb-4">
                    <h1 class="display-3 text-white mb-3" data-i18n="forgot-title">Quên Mật Khẩu</h1>
                </div>
            </div>
        </div>

        <div class="container-xxl py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="wow fadeInUp p-5 border rounded" data-wow-delay="0.2s">
                            <div class="text-center mb-4">
                                <i id="iconTrangThai" class="fa fa-lock fa-3x text-primary mb-3"></i>
                                <p id="moTaTrangThai" data-i18n="forgot-desc">Nhập email của bạn để kiểm tra tài khoản.</p>
                            </div>
                            
                            <!-- BƯỚC 1: NHẬP EMAIL -->
                            <div id="stepEmail">
                                <form onsubmit="kiemTraEmail(event)">
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control" id="forgotEmail" data-i18n-placeholder="forgot-email-ph" placeholder="name@example.com" required>
                                        <label for="forgotEmail" data-i18n="forgot-email-label">Địa chỉ Email</label>
                                    </div>
                                    <button class="btn btn-primary w-100 py-3" type="submit" data-i18n="forgot-btn-check">Kiểm Tra Email</button>
                                </form>
                            </div>

                            <!-- BƯỚC 2: NHẬP MẬT KHẨU MỚI (Mặc định ẩn đi) -->
                            <div id="stepMatKhau" style="display: none;">
                                <form onsubmit="capNhatMatKhau(event)">
                                    <div class="form-floating mb-3">
                                        <input type="password" class="form-control" id="matKhauMoi" data-i18n-placeholder="forgot-new-pass-ph" placeholder="Mật khẩu mới" required minlength="6">
                                        <label for="matKhauMoi" data-i18n="forgot-new-pass-label">Mật khẩu mới</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="password" class="form-control" id="xacNhanMatKhau" data-i18n-placeholder="forgot-confirm-pass-ph" placeholder="Xác nhận mật khẩu" required minlength="6">
                                        <label for="xacNhanMatKhau" data-i18n="forgot-confirm-pass-label">Xác nhận lại mật khẩu</label>
                                    </div>
                                    <button class="btn btn-success w-100 py-3" type="submit" data-i18n="forgot-btn-update">Cập Nhật Mật Khẩu</button>
                                </form>
                            </div>

                            <div class="text-center mt-4">
                                <a href="login.html" class="text-muted">
                                    <i class="fa fa-arrow-left me-2"></i><span data-i18n="forgot-back-login">Quay lại Đăng nhập</span>
                                </a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    <script>
    // Biến lưu tạm toàn bộ thông tin User nếu tìm thấy
    let userHopLe = null;

    // Hàm 1: Gọi API kiểm tra xem email có tồn tại trong Database không
    async function kiemTraEmail(event) {
        event.preventDefault();
        const emailInput = document.getElementById("forgotEmail").value;

        try {
            // Lấy danh sách người dùng từ API Backend
            const response = await axios.get('http://localhost:8080/api/nguoidung');
            const danhSachUsers = response.data;
            
            // Tìm user có email khớp với email khách nhập
            // Lưu ý: Đổi chữ 'email' thành tên cột tương ứng trong DB của bạn (VD: 'gmail', 'taiKhoan'...)
            userHopLe = danhSachUsers.find(u => u.email === emailInput);

            if (userHopLe) {
                // Ẩn form nhập email, Hiện form nhập mật khẩu
                document.getElementById("stepEmail").style.display = "none";
                document.getElementById("stepMatKhau").style.display = "block";

                // Thay đổi icon và lời nhắn
                document.getElementById("iconTrangThai").className = "fa fa-key fa-3x text-success mb-3";
                document.getElementById("moTaTrangThai").innerText = "Tài khoản hợp lệ. Vui lòng tạo mật khẩu mới!";
            } else {
                alert("Email này chưa được đăng ký trong hệ thống!");
            }
        } catch (error) {
            console.error("Lỗi khi kết nối API người dùng:", error);
            alert("Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại Backend!");
        }
    }

    // Hàm 2: Gọi API cập nhật (PUT) mật khẩu mới lên Database
    async function capNhatMatKhau(event) {
        event.preventDefault();
        const matKhauMoi = document.getElementById("matKhauMoi").value;
        const xacNhanMatKhau = document.getElementById("xacNhanMatKhau").value;

        if (matKhauMoi !== xacNhanMatKhau) {
            return alert("Mật khẩu xác nhận không trùng khớp!");
        }

        try {
            // Thay vì gửi toàn bộ Object userHopLe, ta chỉ gửi mật khẩu mới lên cho nhẹ và bảo mật
            const payload = {
                password: matKhauMoi // Chữ "password" này phải khớp với payload.get("password") ở Java
            };

            // Gọi API bằng đường dẫn mới vừa tạo ở Backend
            await axios.put(`http://localhost:8080/api/nguoidung/${userHopLe.id}/matkhau`, payload);

            alert("Cập nhật mật khẩu thành công! Chuyển hướng tới trang đăng nhập.");
            window.location.href = "login.html"; 

        } catch (error) {
            console.error("Lỗi khi cập nhật mật khẩu:", error);
            alert("Đã xảy ra lỗi khi lưu mật khẩu mới vào cơ sở dữ liệu!");
        }
    }
</script>
<!-- Bắt buộc phải có các thư viện này để Dropdown và Navbar hoạt động -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <!-- Các file JS khác của template -->
    <script src="js/main.js"></script>
<script src="js/language.js"></script>
</body>
</html>
